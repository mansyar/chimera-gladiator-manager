[godot]
binary = "C:\\Godot\\Godot_v4.6.2-stable_win64.exe"

[test]
test_dirs = [
    "test",
    "tests",
]
prefix = "test_"
suffix = ".gd"
gutconfig = ".gutconfig.json"

[lint]
exclude = [
    "addons",
    ".godot",
    ".gd-tools",
    ".git",
]

[format]
exclude = [
    "addons",
    ".godot",
    ".gd-tools",
    ".git",
]
max_line_length = 100

[coverage]
enabled = true
min_percent = 80
format = "html"
output_dir = ".gd-tools/coverage"
exclude = [
    "addons",
    ".godot",
    ".gd-tools",
    ".git",
    "scripts/data/enums.gd",
    "scripts/data/part_data.gd",
    "scripts/data/ability_data.gd",
    "scripts/data/ability_effect.gd",
    "scripts/data/behavior_module_data.gd",
]
test_dirs = [
    "test",
    "tests",
]
