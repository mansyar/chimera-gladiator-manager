[godot]
binary = "C:\\Godot\\Godot_v4.6.2-stable_win64.exe"

[test]
test_dirs = [
    "test",
    "tests",
]
prefix = "test_"
suffix = ".gd"
gutconfig = ".gutconfig.json"

[lint]
exclude = [
    "addons",
    ".godot",
    ".gd-tools",
    ".git",
]

[format]
exclude = [
    "addons",
    ".godot",
    ".gd-tools",
    ".git",
]
max_line_length = 100

[coverage]
enabled = false
min_percent = 0
format = "html"
output_dir = ".gd-tools/coverage"
exclude = [
    "addons",
    ".godot",
    ".gd-tools",
    ".git",
]
test_dirs = [
    "test",
    "tests",
]
